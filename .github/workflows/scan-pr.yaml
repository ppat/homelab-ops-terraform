---
# yamllint disable rule:line-length
name: scan-pr

on:
  pull_request:
    paths:
    - '.checkov.yaml'
    - '.github/workflows/**'
    - '.trivyignore.yaml'
    - 'modules/**/*.tf'
    - 'workspaces/**/*.tf'
    - 'trivy.yaml'

permissions:
  contents: read

jobs:
  trivy-scan:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 1
        persist-credentials: false

    - name: Run Trivy
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        hide-progress: false
        format: 'table'
        exit-code: '1'
        trivy-config: trivy.yaml

  checkov-scan:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 1
        persist-credentials: false

    - name: Run Checkov
      uses: bridgecrewio/checkov-action@20fb358293b0af0188f25cf7658b69d49ec12c9a
      with:
        config_file: .checkov.yaml
        output_format: github_failed_only
